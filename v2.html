<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatframe v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0612; cursor: none; }
  canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.4) 100%);
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.035;
    mix-blend-mode: overlay; z-index: 3;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.6'/></svg>");
  }
  .fallback {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(circle at 30% 40%, #8b5cf6 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, #06b6d4 0%, transparent 60%),
                #0a0612;
  }
</style>
</head>
<body>
  <div class="fallback" aria-hidden="true"></div>
  <canvas id="c" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.162.0/build/three.module.js';

const TRAIL_LEN = 24;
const canvas = document.getElementById('c');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
} catch (e) { canvas.style.display = 'none'; throw e; }

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.Camera();

// Trail positions (vec2 array)
const trailPositions = [];
for (let i = 0; i < TRAIL_LEN; i++) trailPositions.push(new THREE.Vector2(0.5, 0.5));

const uniforms = {
  u_time:      { value: 0 },
  u_res:       { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  u_mouse:     { value: new THREE.Vector2(0.5, 0.5) },
  u_trail:     { value: trailPositions },
  u_click:     { value: new THREE.Vector3(0.5, 0.5, -10.0) },
  u_c1:        { value: new THREE.Color('#8b5cf6') },
  u_c2:        { value: new THREE.Color('#06b6d4') },
  u_c3:        { value: new THREE.Color('#ec4899') },
  u_c4:        { value: new THREE.Color('#6d28d9') },
  u_c5:        { value: new THREE.Color('#f0abfc') },
  u_bg:        { value: new THREE.Color('#0a0612') },
};

const vertexShader = /* glsl */ `void main() { gl_Position = vec4(position, 1.0); }`;

const fragmentShader = /* glsl */ `
  precision highp float;
  #define TRAIL_LEN ${TRAIL_LEN}
  uniform float u_time;
  uniform vec2  u_res;
  uniform vec2  u_mouse;
  uniform vec2  u_trail[TRAIL_LEN];
  uniform vec3  u_click;
  uniform vec3  u_c1, u_c2, u_c3, u_c4, u_c5, u_bg;

  vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
  float snoise(vec2 v) {
    const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
    vec2 i  = floor(v + dot(v, C.yy));
    vec2 x0 = v - i + dot(i, C.xx);
    vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
    vec4 x12 = x0.xyxy + C.xxzz;
    x12.xy -= i1;
    i = mod(i, 289.0);
    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
    m = m*m; m = m*m;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 ox = floor(x + 0.5);
    vec3 a0 = x - ox;
    m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
    vec3 g;
    g.x  = a0.x  * x0.x  + h.x  * x0.y;
    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
    return 130.0 * dot(m, g);
  }

  float fbm(vec2 p) {
    float v = 0.0; float a = 0.5;
    for (int i = 0; i < 4; i++) { v += a * snoise(p); p *= 2.1; a *= 0.5; }
    return v;
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / u_res.xy;
    float aspect = u_res.x / u_res.y;
    vec2 p = uv; p.x *= aspect;

    float t = u_time * 0.08;

    // === Base gradient with noise ===
    vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, t * 0.7)));
    vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.5),
                  fbm(p + 4.0 * q + vec2(8.3, 2.8) + t * 0.3));
    float n = fbm(p + 4.0 * r);

    float w1 = smoothstep(-0.3, 0.2, n);
    float w2 = smoothstep( 0.0, 0.5, n);
    float w3 = smoothstep( 0.2, 0.7, n);

    vec3 col = u_bg;
    col = mix(col, u_c4, w1 * 0.6);
    col = mix(col, u_c1, w2 * 0.75);
    col = mix(col, u_c2, w3 * 0.55);
    col = mix(col, u_c3, pow(w3, 3.0) * 0.45);

    // === Trail: loop over past positions ===
    vec3 trailCol = vec3(0.0);
    for (int i = 0; i < TRAIL_LEN; i++) {
      vec2 tp = u_trail[i];
      tp.x *= aspect;
      float d = length(p - tp);
      // Older points are further back in array, fade them out
      float age = float(i) / float(TRAIL_LEN);
      float strength = 1.0 - age;
      // Softness grows with age so older points are bigger/softer
      float size = 3.5 + age * 4.0;
      float halo = exp(-d * size) * strength * 0.12;
      trailCol += u_c5 * halo;
    }
    col += trailCol;

    // === Main cursor: bright orb ===
    vec2 m = u_mouse; m.x *= aspect;
    float cd = length(p - m);
    col += u_c5 * exp(-cd * 6.0) * 0.5;
    col += vec3(1.0, 0.95, 1.0) * exp(-cd * 35.0) * 1.5;

    // === Click ripple ===
    vec2 clickPos = u_click.xy; clickPos.x *= aspect;
    float clickDist = length(p - clickPos);
    float clickAge = u_time - u_click.z;
    if (clickAge >= 0.0 && clickAge < 1.8) {
      float rippleRadius = clickAge * 0.9;
      float ripple = smoothstep(0.05, 0.0, abs(clickDist - rippleRadius));
      ripple *= 1.0 - (clickAge / 1.8);
      col += u_c5 * ripple;
    }

    // Vignette
    float vig = 1.0 - length(uv - 0.5) * 0.4;
    col *= vig;

    gl_FragColor = vec4(col, 1.0);
  }
`;

const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

// === Mouse tracking ===
const targetMouse = new THREE.Vector2(0.5, 0.5);

window.addEventListener('pointermove', (e) => {
  targetMouse.x = e.clientX / window.innerWidth;
  targetMouse.y = 1.0 - e.clientY / window.innerHeight;
});

window.addEventListener('pointerdown', (e) => {
  const x = e.clientX / window.innerWidth;
  const y = 1.0 - e.clientY / window.innerHeight;
  uniforms.u_click.value.set(x, y, uniforms.u_time.value);
});

window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
});

let running = true;
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  if (running) requestAnimationFrame(loop);
});

const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const start = performance.now();
let frameCount = 0;

function loop() {
  if (!running) return;
  const elapsed = (performance.now() - start) * 0.001;
  uniforms.u_time.value = reduced ? 0 : elapsed;

  // Smooth main mouse (fast follow)
  const smooth = 0.25;
  const current = uniforms.u_mouse.value;
  current.x += (targetMouse.x - current.x) * smooth;
  current.y += (targetMouse.y - current.y) * smooth;

  // Push new position to trail every 2nd frame for smoother tail
  if (frameCount % 2 === 0) {
    // Shift trail: newest = index 0, push others back
    for (let i = TRAIL_LEN - 1; i > 0; i--) {
      trailPositions[i].copy(trailPositions[i - 1]);
    }
    trailPositions[0].copy(current);
  }
  frameCount++;

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
