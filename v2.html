<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatframe v2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0612; cursor: none; }
  canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.4) 100%);
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.035;
    mix-blend-mode: overlay; z-index: 3;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.6'/></svg>");
  }
  .fallback {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(circle at 30% 40%, #8b5cf6 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, #06b6d4 0%, transparent 60%),
                #0a0612;
  }
</style>
</head>
<body>
  <div class="fallback" aria-hidden="true"></div>
  <canvas id="c" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.162.0/build/three.module.js';

const canvas = document.getElementById('c');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'high-performance' });
} catch (e) { canvas.style.display = 'none'; throw e; }

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.Camera();

const uniforms = {
  u_time:      { value: 0 },
  u_res:       { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  u_mouse:     { value: new THREE.Vector2(0.5, 0.5) },
  u_mouseVel:  { value: new THREE.Vector2(0, 0) },
  u_click:     { value: new THREE.Vector3(0.5, 0.5, -10.0) }, // xy pos, z = time of click
  u_c1:        { value: new THREE.Color('#8b5cf6') },
  u_c2:        { value: new THREE.Color('#06b6d4') },
  u_c3:        { value: new THREE.Color('#ec4899') },
  u_c4:        { value: new THREE.Color('#6d28d9') },
  u_c5:        { value: new THREE.Color('#f0abfc') }, // cursor color (hot pink/lilac)
  u_bg:        { value: new THREE.Color('#0a0612') },
};

const vertexShader = /* glsl */ `void main() { gl_Position = vec4(position, 1.0); }`;

const fragmentShader = /* glsl */ `
  precision highp float;
  uniform float u_time;
  uniform vec2  u_res;
  uniform vec2  u_mouse;
  uniform vec2  u_mouseVel;
  uniform vec3  u_click; // xy pos (0-1), z = time when clicked
  uniform vec3  u_c1, u_c2, u_c3, u_c4, u_c5, u_bg;

  vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
  float snoise(vec2 v) {
    const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
    vec2 i  = floor(v + dot(v, C.yy));
    vec2 x0 = v - i + dot(i, C.xx);
    vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
    vec4 x12 = x0.xyxy + C.xxzz;
    x12.xy -= i1;
    i = mod(i, 289.0);
    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
    m = m*m; m = m*m;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 ox = floor(x + 0.5);
    vec3 a0 = x - ox;
    m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
    vec3 g;
    g.x  = a0.x  * x0.x  + h.x  * x0.y;
    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
    return 130.0 * dot(m, g);
  }

  float fbm(vec2 p) {
    float v = 0.0; float a = 0.5;
    for (int i = 0; i < 4; i++) { v += a * snoise(p); p *= 2.1; a *= 0.5; }
    return v;
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / u_res.xy;
    float aspect = u_res.x / u_res.y;
    vec2 p = uv;
    p.x *= aspect;

    float t = u_time * 0.08;

    // Mouse in aspect-corrected space
    vec2 mAspect = u_mouse;
    mAspect.x *= aspect;
    vec2 toMouse = p - mAspect;
    float distMouse = length(toMouse);

    // === Mouse warp: swirl the domain around cursor ===
    float warpStrength = exp(-distMouse * 3.0) * 0.8;
    float angle = warpStrength * 2.5 + u_time * 0.3;
    float ca = cos(angle), sa = sin(angle);
    vec2 warped = p;
    warped -= mAspect;
    warped = mat2(ca, -sa, sa, ca) * warped;
    warped += mAspect;

    // === Mouse velocity pushes the noise ===
    warped += u_mouseVel * exp(-distMouse * 4.0) * 0.3;

    // Domain warp noise
    vec2 q = vec2(fbm(warped + vec2(0.0, t)), fbm(warped + vec2(5.2, t * 0.7)));
    vec2 r = vec2(fbm(warped + 4.0 * q + vec2(1.7, 9.2) + t * 0.5),
                  fbm(warped + 4.0 * q + vec2(8.3, 2.8) + t * 0.3));
    float n = fbm(warped + 4.0 * r);

    // Color weights from noise
    float w1 = smoothstep(-0.3, 0.2, n);
    float w2 = smoothstep( 0.0, 0.5, n);
    float w3 = smoothstep( 0.2, 0.7, n);

    vec3 col = u_bg;
    col = mix(col, u_c4, w1 * 0.7);
    col = mix(col, u_c1, w2 * 0.85);
    col = mix(col, u_c2, w3 * 0.6);
    col = mix(col, u_c3, pow(w3, 3.0) * 0.5);

    // === Mouse glow halo ===
    float glow = exp(-distMouse * 4.5) * 0.55;
    col += u_c5 * glow;

    // Inner bright core
    float core = exp(-distMouse * 20.0) * 1.2;
    col += vec3(1.0, 0.9, 1.0) * core;

    // === Click ripple ===
    vec2 clickPos = u_click.xy;
    clickPos.x *= aspect;
    float clickDist = length(p - clickPos);
    float clickAge = u_time - u_click.z;
    if (clickAge >= 0.0 && clickAge < 2.0) {
      float rippleRadius = clickAge * 0.8;
      float rippleWidth = 0.04;
      float ripple = smoothstep(rippleWidth, 0.0, abs(clickDist - rippleRadius));
      ripple *= 1.0 - (clickAge / 2.0); // fade out over 2s
      col += u_c5 * ripple * 0.9;
    }

    // Edge vignette
    float vig = 1.0 - length(uv - 0.5) * 0.4;
    col *= vig;

    gl_FragColor = vec4(col, 1.0);
  }
`;

const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

// === Mouse tracking with smoothing ===
const targetMouse = new THREE.Vector2(0.5, 0.5);
const lastMouse = new THREE.Vector2(0.5, 0.5);

window.addEventListener('pointermove', (e) => {
  targetMouse.x = e.clientX / window.innerWidth;
  targetMouse.y = 1.0 - e.clientY / window.innerHeight;
});

window.addEventListener('pointerdown', (e) => {
  const x = e.clientX / window.innerWidth;
  const y = 1.0 - e.clientY / window.innerHeight;
  uniforms.u_click.value.set(x, y, uniforms.u_time.value);
});

// Resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
});

// Pause when tab hidden
let running = true;
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  if (running) requestAnimationFrame(loop);
});

const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const start = performance.now();

function loop() {
  if (!running) return;
  const elapsed = (performance.now() - start) * 0.001;
  uniforms.u_time.value = reduced ? 0 : elapsed;

  // Smooth mouse toward target (lerp)
  const smooth = 0.08;
  const current = uniforms.u_mouse.value;
  const newX = current.x + (targetMouse.x - current.x) * smooth;
  const newY = current.y + (targetMouse.y - current.y) * smooth;

  // Velocity (delta from last frame)
  uniforms.u_mouseVel.value.set((newX - lastMouse.x) * 10.0, (newY - lastMouse.y) * 10.0);
  lastMouse.set(newX, newY);
  current.set(newX, newY);

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
