<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatframe — galaxy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05040a; cursor: default; font-family: -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; color: #fafafa; }
  canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }
  .vignette {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.5) 100%);
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.03; z-index: 3;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.6'/></svg>");
  }
</style>
</head>
<body>
  <canvas id="c" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

<script type="module">
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const dpr = Math.min(window.devicePixelRatio, 2);

  function resize() {
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    initStars();
  }

  // === STARFIELD ===
  let stars = [];
  function initStars() {
    const w = window.innerWidth, h = window.innerHeight;
    const count = Math.floor((w * h) / 4500);
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * h,
        size: Math.random() * 1.2 + 0.2,
        twinkleSpeed: 0.5 + Math.random() * 2,
        twinklePhase: Math.random() * Math.PI * 2,
        depth: Math.random(),
      });
    }
  }

  // === ORBITAL SATELLITES (rings of bots) ===
  const COLORS = ['#8b5cf6', '#06b6d4', '#ec4899', '#f0abfc', '#6d28d9', '#0ea5e9'];
  const rings = [
    { radius: 0.12, count: 6,  speed: 0.35, size: 3.5, color: '#8b5cf6' },
    { radius: 0.22, count: 10, speed: 0.22, size: 3.0, color: '#06b6d4' },
    { radius: 0.34, count: 14, speed: -0.14, size: 2.8, color: '#ec4899' },
    { radius: 0.46, count: 18, speed: 0.09, size: 2.4, color: '#f0abfc' },
  ];

  let satellites = [];
  function initSatellites() {
    satellites = [];
    rings.forEach((ring, ringIdx) => {
      for (let i = 0; i < ring.count; i++) {
        const angle = (i / ring.count) * Math.PI * 2 + Math.random() * 0.3;
        satellites.push({
          ringIdx,
          angle,
          baseAngle: angle,
          pulse: Math.random() * Math.PI * 2,
        });
      }
    });
  }
  initSatellites();

  // === DUST PARTICLES (floating) ===
  let dust = [];
  function initDust() {
    dust = [];
    for (let i = 0; i < 40; i++) {
      dust.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.15,
        size: Math.random() * 1.5 + 0.5,
        opacity: Math.random() * 0.4 + 0.1,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
      });
    }
  }
  initDust();

  // === MOUSE PARALLAX ===
  let targetMouse = { x: 0, y: 0 };
  let mouse = { x: 0, y: 0 };
  window.addEventListener('pointermove', (e) => {
    targetMouse.x = (e.clientX / window.innerWidth - 0.5) * 2;
    targetMouse.y = (e.clientY / window.innerHeight - 0.5) * 2;
  });

  resize();
  window.addEventListener('resize', resize);

  let running = true;
  document.addEventListener('visibilitychange', () => {
    running = !document.hidden;
    if (running) { lastTime = performance.now(); requestAnimationFrame(draw); }
  });

  const start = performance.now();
  let lastTime = start;

  function draw() {
    if (!running) return;
    const now = performance.now();
    const t = (now - start) * 0.001;
    const dt = Math.min((now - lastTime) / 16.667, 3);
    lastTime = now;

    const w = window.innerWidth, h = window.innerHeight;
    const cx = w / 2, cy = h / 2;
    const minDim = Math.min(w, h);

    // Smooth mouse parallax
    mouse.x += (targetMouse.x - mouse.x) * 0.04;
    mouse.y += (targetMouse.y - mouse.y) * 0.04;
    const px = mouse.x * 20;
    const py = mouse.y * 20;

    // === CLEAR with subtle gradient ===
    const bgGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h));
    bgGrad.addColorStop(0, '#0f0620');
    bgGrad.addColorStop(0.5, '#08041a');
    bgGrad.addColorStop(1, '#05040a');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, w, h);

    // === STARFIELD ===
    stars.forEach((s) => {
      const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(t * s.twinkleSpeed + s.twinklePhase));
      const parallaxX = px * s.depth * 2;
      const parallaxY = py * s.depth * 2;
      ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.8})`;
      ctx.beginPath();
      ctx.arc(s.x + parallaxX, s.y + parallaxY, s.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // === DUST PARTICLES ===
    dust.forEach((d) => {
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      if (d.x < -10) d.x = w + 10;
      if (d.x > w + 10) d.x = -10;
      if (d.y < -10) d.y = h + 10;
      if (d.y > h + 10) d.y = -10;
      ctx.fillStyle = d.color + Math.floor(d.opacity * 255).toString(16).padStart(2, '0');
      ctx.beginPath();
      ctx.arc(d.x + px * 0.5, d.y + py * 0.5, d.size, 0, Math.PI * 2);
      ctx.fill();
    });

    // === ORBITAL RINGS (faint circles) ===
    ctx.save();
    ctx.translate(px * 0.3, py * 0.3);
    rings.forEach((ring) => {
      ctx.strokeStyle = `${ring.color}15`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(cx, cy, minDim * ring.radius, minDim * ring.radius * 0.95, 0, 0, Math.PI * 2);
      ctx.stroke();
    });
    ctx.restore();

    // === SATELLITES ===
    ctx.save();
    ctx.translate(px * 0.3, py * 0.3);
    satellites.forEach((sat) => {
      const ring = rings[sat.ringIdx];
      sat.angle = sat.baseAngle + t * ring.speed;
      const rx = minDim * ring.radius;
      const ry = minDim * ring.radius * 0.95;
      const x = cx + Math.cos(sat.angle) * rx;
      const y = cy + Math.sin(sat.angle) * ry;

      const pulse = 0.5 + 0.5 * Math.sin(t * 2 + sat.pulse);

      // Halo
      const haloGrad = ctx.createRadialGradient(x, y, 0, x, y, ring.size * 6);
      haloGrad.addColorStop(0, `${ring.color}80`);
      haloGrad.addColorStop(1, `${ring.color}00`);
      ctx.fillStyle = haloGrad;
      ctx.beginPath();
      ctx.arc(x, y, ring.size * 6, 0, Math.PI * 2);
      ctx.fill();

      // Core
      ctx.fillStyle = ring.color;
      ctx.shadowColor = ring.color;
      ctx.shadowBlur = 8 + pulse * 6;
      ctx.beginPath();
      ctx.arc(x, y, ring.size + pulse * 0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });
    ctx.restore();

    // === CORE ICP·BOTS SUN ===
    const coreRadius = minDim * 0.06;
    const corePulse = 0.5 + 0.5 * Math.sin(t * 0.8);

    // Outer atmospheric glow
    for (let i = 4; i > 0; i--) {
      const r = coreRadius * (1 + i * 0.8);
      const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
      coreGrad.addColorStop(0, `rgba(139,92,246,${0.15 / i})`);
      coreGrad.addColorStop(0.6, `rgba(236,72,153,${0.08 / i})`);
      coreGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = coreGrad;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Inner core
    const innerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreRadius);
    innerGrad.addColorStop(0, '#ffffff');
    innerGrad.addColorStop(0.3, '#f0abfc');
    innerGrad.addColorStop(0.7, '#8b5cf6');
    innerGrad.addColorStop(1, '#6d28d9');
    ctx.fillStyle = innerGrad;
    ctx.shadowColor = '#8b5cf6';
    ctx.shadowBlur = 40 + corePulse * 30;
    ctx.beginPath();
    ctx.arc(cx, cy, coreRadius * (0.9 + corePulse * 0.1), 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Core flare (rotating rays)
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.15);
    ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < 6; i++) {
      ctx.rotate(Math.PI / 3);
      ctx.fillStyle = 'rgba(240,171,252,0.08)';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(coreRadius * 8, -coreRadius * 0.3);
      ctx.lineTo(coreRadius * 8, coreRadius * 0.3);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();

    // === BIG ICP·BOTS TEXT at top ===
    const fontSize = Math.min(w * 0.075, 90);
    ctx.font = `900 ${fontSize}px -apple-system, "SF Pro Display", "Helvetica Neue", Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const textY = h * 0.15;
    const pulseTxt = 0.5 + 0.5 * Math.sin(t * 1.2);

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.shadowColor = '#8b5cf6';
    ctx.shadowBlur = 60 + pulseTxt * 30;
    ctx.fillStyle = 'rgba(139,92,246,0.15)';
    ctx.fillText('ICP·BOTS', cx + px * 0.2, textY + py * 0.2);

    ctx.shadowColor = '#ec4899';
    ctx.shadowBlur = 35;
    ctx.fillStyle = 'rgba(236,72,153,0.1)';
    ctx.fillText('ICP·BOTS', cx + px * 0.2, textY + py * 0.2);
    ctx.restore();

    const txtGrad = ctx.createLinearGradient(cx - fontSize * 2, textY, cx + fontSize * 2, textY);
    txtGrad.addColorStop(0, '#8b5cf6');
    txtGrad.addColorStop(0.5, '#f0abfc');
    txtGrad.addColorStop(1, '#06b6d4');
    ctx.strokeStyle = txtGrad;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.4 + pulseTxt * 0.3;
    ctx.strokeText('ICP·BOTS', cx + px * 0.2, textY + py * 0.2);
    ctx.globalAlpha = 1;

    // Tagline
    ctx.font = `500 ${fontSize * 0.18}px -apple-system, monospace`;
    ctx.fillStyle = 'rgba(250,250,250,0.35)';
    ctx.fillText('AI-POWERED XAT BOT NETWORK', cx + px * 0.2, textY + fontSize * 0.6 + py * 0.2);

    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
