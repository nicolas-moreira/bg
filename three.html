<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xatframe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0612; }
  canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }
  .vignette {
    position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.45) 100%);
    z-index: 2;
  }
  .grain {
    position: fixed; inset: 0; pointer-events: none; opacity: 0.04;
    mix-blend-mode: overlay; z-index: 3;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.6'/></svg>");
  }
  /* CSS fallback if WebGL fails */
  .fallback {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(circle at 20% 30%, #8b5cf6 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, #06b6d4 0%, transparent 50%),
      radial-gradient(circle at 50% 90%, #ec4899 0%, transparent 50%),
      #0a0612;
  }
</style>
</head>
<body>
  <div class="fallback" aria-hidden="true"></div>
  <canvas id="c" aria-hidden="true"></canvas>
  <div class="vignette" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.162.0/build/three.module.js';

const canvas = document.getElementById('c');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: false, powerPreference: 'low-power' });
} catch (e) {
  console.warn('WebGL unavailable, using CSS fallback');
  canvas.style.display = 'none';
  throw e;
}

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.Camera();

const uniforms = {
  u_time:  { value: 0 },
  u_res:   { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
  u_mouse: { value: new THREE.Vector2(0.5, 0.5) },
  u_c1:    { value: new THREE.Color('#8b5cf6') }, // violet
  u_c2:    { value: new THREE.Color('#06b6d4') }, // cyan
  u_c3:    { value: new THREE.Color('#ec4899') }, // pink
  u_c4:    { value: new THREE.Color('#6d28d9') }, // deep purple
  u_bg:    { value: new THREE.Color('#0a0612') }, // background
};

const vertexShader = /* glsl */ `
  void main() { gl_Position = vec4(position, 1.0); }
`;

// Domain-warped simplex noise gradient
const fragmentShader = /* glsl */ `
  precision highp float;
  uniform float u_time;
  uniform vec2  u_res;
  uniform vec2  u_mouse;
  uniform vec3  u_c1;
  uniform vec3  u_c2;
  uniform vec3  u_c3;
  uniform vec3  u_c4;
  uniform vec3  u_bg;

  // Simplex 2D noise (Ashima)
  vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
  float snoise(vec2 v) {
    const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
    vec2 i  = floor(v + dot(v, C.yy));
    vec2 x0 = v - i + dot(i, C.xx);
    vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
    vec4 x12 = x0.xyxy + C.xxzz;
    x12.xy -= i1;
    i = mod(i, 289.0);
    vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
    m = m*m; m = m*m;
    vec3 x = 2.0 * fract(p * C.www) - 1.0;
    vec3 h = abs(x) - 0.5;
    vec3 ox = floor(x + 0.5);
    vec3 a0 = x - ox;
    m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
    vec3 g;
    g.x  = a0.x  * x0.x  + h.x  * x0.y;
    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
    return 130.0 * dot(m, g);
  }

  // fractional brownian motion
  float fbm(vec2 p) {
    float v = 0.0;
    float a = 0.5;
    for (int i = 0; i < 4; i++) {
      v += a * snoise(p);
      p *= 2.1;
      a *= 0.5;
    }
    return v;
  }

  void main() {
    vec2 uv = gl_FragCoord.xy / u_res.xy;
    float aspect = u_res.x / u_res.y;
    vec2 p = uv;
    p.x *= aspect;

    float t = u_time * 0.08;

    // Domain warp — noise fed into itself for swirling patterns
    vec2 q = vec2(fbm(p + vec2(0.0, t)), fbm(p + vec2(5.2, t * 0.7)));
    vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2) + t * 0.5),
                  fbm(p + 4.0 * q + vec2(8.3, 2.8) + t * 0.3));
    float n = fbm(p + 4.0 * r);

    // Mouse parallax (subtle)
    vec2 m = (u_mouse - 0.5) * 0.15;
    n += snoise(p * 2.0 + m) * 0.15;

    // Remap noise to color mix weights
    float w1 = smoothstep(-0.3, 0.2, n);
    float w2 = smoothstep( 0.0, 0.5, n);
    float w3 = smoothstep( 0.2, 0.7, n);

    vec3 col = u_bg;
    col = mix(col, u_c4, w1 * 0.7);
    col = mix(col, u_c1, w2 * 0.85);
    col = mix(col, u_c2, w3 * 0.6);
    col = mix(col, u_c3, pow(w3, 3.0) * 0.5);

    // Radial darkening at edges so chat stays readable
    float vig = 1.0 - length(uv - 0.5) * 0.5;
    col *= vig;

    gl_FragColor = vec4(col, 1.0);
  }
`;

const material = new THREE.ShaderMaterial({ uniforms, vertexShader, fragmentShader });
const geometry = new THREE.PlaneGeometry(2, 2);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

// Resize
function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  uniforms.u_res.value.set(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

// Mouse parallax
window.addEventListener('pointermove', (e) => {
  uniforms.u_mouse.value.set(e.clientX / window.innerWidth, 1.0 - e.clientY / window.innerHeight);
});

// Respect reduced motion
const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Pause when tab hidden to save CPU/GPU
let running = true;
document.addEventListener('visibilitychange', () => {
  running = !document.hidden;
  if (running) requestAnimationFrame(loop);
});

const start = performance.now();
function loop() {
  if (!running) return;
  const elapsed = (performance.now() - start) * 0.001;
  uniforms.u_time.value = reduced ? 0 : elapsed;
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
